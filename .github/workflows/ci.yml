name: CI

on:
  push:
    branches: [main]
    paths: ["cli/**", "deno.json", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main]
    paths: ["cli/**", "deno.json", ".github/workflows/ci.yml"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Lint
        run: deno lint cli/

      - name: Format check
        run: deno fmt --check cli/

      - name: Test
        run: deno test cli/ --allow-read --allow-write --allow-env
