name: CI

on:
  push:
    branches: [main]
    paths: ["cli/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main]
    paths: ["cli/**", ".github/workflows/ci.yml"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Lint
        run: deno lint cli/

      - name: Format check
        run: deno fmt --check cli/

      # cli/deno.json はルートからの実行では発見されない（bare specifier が
      # TS2307 で解決できず落ちる）ため、cli/ を作業ディレクトリにして実行する。
      - name: Test
        working-directory: cli
        run: deno test . --allow-read --allow-write --allow-env
