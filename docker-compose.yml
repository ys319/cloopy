name: ${CLOOPY_INSTANCE_NAME:-cloopy}

services:
  sandbox:
    image: ys319/cloopy:latest
    build:
      context: ./docker
    ports:
      - "${CLOOPY_SSH_PORT:-10022}:22"
    environment:
      - PUID=${CLOOPY_USER_UID:-1000}
      - PGID=${CLOOPY_USER_GID:-1000}
      - TZ=${CLOOPY_TIMEZONE:-Asia/Tokyo}
      # Egress firewall (on: block metadata/private networks, off: kill switch)
      - CLOOPY_FIREWALL=${CLOOPY_FIREWALL:-on}
      # Allow the container to reach the Docker host (host.docker.internal).
      - CLOOPY_ALLOW_HOST=${CLOOPY_ALLOW_HOST:-on}
      # Filtering DNS resolver pinned by the firewall (malware/phishing blocking
      # at name resolution). Default: Cloudflare for Families (1.1.1.2). The
      # firewall blocks :53 to anything else. See .env.example for presets.
      - CLOOPY_DNS_PRIMARY=${CLOOPY_DNS_PRIMARY:-1.1.1.2}
      - CLOOPY_DNS_SECONDARY=${CLOOPY_DNS_SECONDARY:-1.0.0.2}
      - CLOOPY_DNS_V6_PRIMARY=${CLOOPY_DNS_V6_PRIMARY:-2606:4700:4700::1112}
      - CLOOPY_DNS_V6_SECONDARY=${CLOOPY_DNS_V6_SECONDARY:-2606:4700:4700::1002}
    # Point the container's resolver at the filtering DNS above. On a Compose
    # network this sets the upstream for Docker's embedded DNS (127.0.0.11);
    # the firewall then pins :53 to these IPs so it cannot be bypassed.
    dns:
      - ${CLOOPY_DNS_PRIMARY:-1.1.1.2}
      - ${CLOOPY_DNS_SECONDARY:-1.0.0.2}
    # Make host.docker.internal resolve on Linux too (Docker Desktop already
    # provides it). The firewall ACCEPTs this single IP while the rest of the
    # host's private range stays blocked.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Host bind mounts carry the `z` flag so SELinux hosts (Fedora CoreOS /
    # uCore: dockerd runs with --selinux-enabled) relabel them readable for the
    # container. On hosts without SELinux (macOS/Windows/Ubuntu) `z` is a no-op.
    volumes:
      # Authorized public key. Staged read-only; init-ssh-keys copies it to
      # ~/.ssh/authorized_keys with the right owner/mode (chown/chmod on the
      # bind mount itself would mutate the host's real file).
      - ${CLOOPY_PUBKEY_PATH}:/etc/cloopy/authorized_keys:ro,z
      # Assets
      - ./assets/CLAUDE.md:/home/developer/.claude/CLAUDE.md:z
      - ./assets/.zshenv:/home/developer/.zshenv:z
      # Persist SSH Host Keys
      - ssh-config:/etc/ssh
      # Default: Bind Mount Workspace
      - ${CLOOPY_HOST_WORKSPACE:-./workspace}:/home/developer/workspace:z
      # Persist Home and Nix
      - home-data:/home/developer
      - nix-store:/nix
    # NET_ADMIN lets init-firewall manage iptables inside the container.
    # Coexists with no-new-privileges. Remove this to fully disable the
    # firewall (the script then fails open and warns).
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    pids_limit: 16384
    mem_limit: 8g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -lnt | grep -q :22 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 3s

volumes:
  ssh-config:
  home-data:
  nix-store:
